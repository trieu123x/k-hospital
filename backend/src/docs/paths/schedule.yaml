paths:
  /schedules/create:
    post:
      summary: Tạo lịch làm việc cho bác sĩ
      tags: [Schedule]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [doctorId, date, shift]
                properties:
                  doctorId:
                    type: string
                    format: uuid
                  date:
                    type: string
                    format: date
                  shift:
                    type: integer
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schedule'

  /schedules/doctor/{doctorId}:
    get:
      summary: Lấy lịch làm việc của một bác sĩ
      tags: [Schedule]
      security:
        - bearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schedule'

  /schedules/{scheduleId}:
    delete:
      summary: Xóa một ca làm việc chưa được đặt
      tags: [Schedule]
      security:
        - bearerAuth: []
      parameters:
        - name: scheduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
