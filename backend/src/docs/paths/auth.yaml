paths:
  /auth/register:
    post:
      summary: Đăng ký tài khoản mới
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fullName, phone, password, confirmPassword]
              properties:
                fullName:
                  type: string
                phone:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                confirmPassword:
                  type: string
                  format: password
      responses:
        '201':
          description: Created
        '500':
          description: Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      summary: Đăng nhập
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone:
                  type: string
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  accessToken:
                    type: string
                  user:
                    $ref: '#/components/schemas/Profile'
        '500':
          description: Error

  /auth/forgot-password:
    post:
      summary: Quên mật khẩu
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone:
                  type: string
      responses:
        '200':
          description: OK
        '500':
          description: Error

  /auth/reset-password:
    post:
      summary: Đặt lại mật khẩu
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, newPassword, confirmNewPassword]
              properties:
                phone:
                  type: string
                newPassword:
                  type: string
                  format: password
                confirmNewPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: OK
        '500':
          description: Error

  /auth/logout:
    post:
      summary: Đăng xuất
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
        '500':
          description: Error

  /auth/me:
    get:
      summary: Lấy thông tin user hiện tại
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Profile'
        '500':
          description: Error
