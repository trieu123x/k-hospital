paths:
  /specialties:
    get:
      summary: Lấy danh sách tất cả chuyên khoa
      tags: [Specialty]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Specialty'

  /specialties/{id}:
    get:
      summary: Lấy danh sách bác sĩ thuộc chuyên khoa cụ thể
      tags: [Specialty]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Profile'
                        - $ref: '#/components/schemas/DoctorItem'
