paths:
  /appointments/slots:
    get:
      summary: Lấy danh sách ca khám trống
      tags: [Appointment]
      parameters:
        - name: doctorId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2024-05-20"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy danh sách giờ trống thành công
                  data:
                    type: array
                    items:
                      type: integer
                      example: 1

  /appointments/book:
    post:
      summary: Đặt lịch khám (Patient / Admin)
      tags: [Appointment]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [patientId, doctorId, date, shift]
              properties:
                patientId:
                  type: string
                  format: uuid
                doctorId:
                  type: string
                  format: uuid
                date:
                  type: string
                  format: date
                  example: "2024-05-20"
                shift:
                  type: integer
                  enum: [1, 2, 3, 4]
                reason:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đặt lịch khám thành công. Vui lòng chờ bác sĩ xác nhận.
                  data:
                    $ref: '#/components/schemas/Appointment'

  /appointments/all:
    get:
      summary: Lấy tất cả lịch hẹn (Admin / Doctor)
      tags: [Appointment]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, completed, cancelled]
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: lastId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
        - name: desc
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy danh sách toàn bộ lịch khám thành công
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'

  /appointments/patient/{userId}:
    get:
      summary: Lấy lịch sử khám của bệnh nhân (Admin / Doctor / Patient)
      tags: [Appointment]
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: lastId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: desc
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy danh sách lịch sử khám thành công
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'

  /appointments/doctor/{doctorId}:
    get:
      summary: Lấy danh sách lịch khám của bác sĩ (Admin / Doctor)
      tags: [Appointment]
      security:
        - bearerAuth: []
      parameters:
        - name: doctorId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: lastId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
        - name: desc
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy danh sách lịch khám của bác sĩ thành công
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Appointment'

  /appointments/cancel/{appointmentId}:
    patch:
      summary: Hủy lịch khám (Patient / Admin)
      tags: [Appointment]
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Hủy lịch khám thành công.

  /appointments/update/status/{appointmentId}:
    patch:
      summary: Cập nhật trạng thái lịch khám (Admin / Doctor)
      tags: [Appointment]
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, confirmed, completed, cancelled]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Cập nhật trạng thái lịch khám thành công.
                  data:
                    $ref: '#/components/schemas/Appointment'

  /appointments/medical-record/create/{appointmentId}:
    post:
      summary: Tạo hồ sơ bệnh án cho lịch khám (Doctor)
      tags: [Medical Record]
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [diagnosis]
              properties:
                diagnosis:
                  type: string
                prescription:
                  type: string
                note:
                  type: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Tạo hồ sơ bệnh án thành công.
                  data:
                    $ref: '#/components/schemas/MedicalRecord'

  /appointments/medical-record/{appointmentId}:
    get:
      summary: Lấy chi tiết hồ sơ bệnh án (Doctor / Patient)
      tags: [Medical Record]
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy thông tin bệnh án thành công.
                  data:
                    $ref: '#/components/schemas/MedicalRecord'

  /appointments/medical-record/update/{appointmentId}:
    patch:
      summary: Cập nhật hồ sơ bệnh án (Doctor)
      tags: [Medical Record]
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                diagnosis:
                  type: string
                prescription:
                  type: string
                note:
                  type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Cập nhật hồ sơ bệnh án thành công.
                  data:
                    $ref: '#/components/schemas/MedicalRecord'

  /appointments/{appointmentId}:
    get:
      summary: Lấy chi tiết lịch hẹn (Admin / Doctor / Patient)
      tags: [Appointment]
      security:
        - bearerAuth: []
      parameters:
        - name: appointmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Lấy thông tin lịch khám thành công
                  data:
                    $ref: '#/components/schemas/Appointment'
/appointments/leave:
    post:
      summary: Đăng ký lịch nghỉ/bận (Doctor)
      tags: [Appointment]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, reason]
              properties:
                date:
                  type: string
                  format: date
                  example: "2024-05-20"
                shift:
                  type: integer
                  nullable: true
                  enum: [1, 2, 3, 4]
                  description: "Ca muốn nghỉ (1-4). Bỏ trống hoặc truyền null nếu nghỉ nguyên ngày."
                  example: 1
                reason:
                  type: string
                  description: "Lý do xin nghỉ (ít nhất 5 ký tự)"
                  example: "Đi công tác đột xuất"
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Đăng ký lịch nghỉ thành công.
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      doctorId:
                        type: string
                        format: uuid
                      date:
                        type: string
                        format: date-time
                      shift:
                        type: integer
                        nullable: true
                      reason:
                        type: string
/appointments/leave/{leaveId}:
    delete:
      summary: Hủy lịch nghỉ/bận đã đăng ký (Doctor)
      tags: [Appointment]
      security:
        - bearerAuth: []
      parameters:
        - name: leaveId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID của bản ghi lịch nghỉ cần hủy
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Hủy lịch nghỉ thành công.