name: MediCare CI System

on:
  push:
    branches: [ main, dung ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]

jobs:
  # --- KIỂM TRA BACKEND ---
  backend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Validate Prisma Schema
        run: npx prisma validate

      - name: Run Backend Unit Tests (Vitest)
        run: npm run test

  # --- KIỂM TRA FRONTEND ---
  frontend-validation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm install